version: 2

updates:
  # Python dependencies (reads pyproject.toml via pip ecosystem)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-dependencies:
        dependency-type: development
        patterns: ["*"]
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (pins action versions)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
