name: CI

on:
  push:
    branches: ["v[0-9]*.[0-9]*.[0-9]*", "v[0-9]*.[0-9]*.[0-9]*/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Type check (mypy)
        run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing

  open-pr:
    name: Open Release PR
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/v')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          if ! echo "$BRANCH" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(/.*)?$'; then
            echo "Branch '$BRANCH' does not match vX.X.X — skipping PR creation."
            exit 0
          fi

          VERSION=$(echo "$BRANCH" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')

          EXISTING=$(gh pr list --base main --head "$BRANCH" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH — skipping."
            exit 0
          fi

          printf "## Release %s\n\nAutomated release PR from branch \`%s\`.\n\nAll CI checks passed — merge to publish \`%s\` to PyPI.\n\n## Checklist\n\n- [ ] CHANGELOG updated\n- [ ] Version bump reviewed\n- [ ] Ready to publish\n" \
            "$VERSION" "$BRANCH" "$VERSION" > /tmp/pr_body.md

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release $VERSION" \
            --body-file /tmp/pr_body.md
