name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default; individual jobs may expand as needed.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: mypy
        # Skip gracefully until source files exist; remove the guard once
        # the package implementation is in place.
        run: |
          if [ -f src/aidriven/__init__.py ] && [ "$(find src/aidriven -name '*.py' | wc -l)" -gt 1 ]; then
            uv run mypy src/
          else
            echo "Skipping mypy: source files not yet implemented."
          fi

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        # Exit code 5 = "no tests collected" — acceptable until implementation exists.
        run: uv run pytest --cov --cov-report=term-missing || [ $? -eq 5 ]
