name: Release Branch

# Triggered when a version branch (e.g. v0.1.0, v1.2.3-rc1) is pushed.
# Purpose: validate that the code on this branch is release-ready.
# Publishing to PyPI is handled separately by publish.yml (tag-triggered).

on:
  push:
    branches:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  validate:
    name: Release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: |
          if [ -f src/aidriven/__init__.py ] && [ "$(find src/aidriven -name '*.py' | wc -l)" -gt 1 ]; then
            uv run mypy src/
          else
            echo "Skipping mypy: source files not yet implemented."
          fi

      - name: Test
        # Exit code 5 = "no tests collected" — acceptable until implementation exists.
        run: uv run pytest --cov --cov-report=term-missing || [ $? -eq 5 ]

      - name: Build distribution
        run: uv build

      - name: Verify dist artifacts
        run: ls -lh dist/
